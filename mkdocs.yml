    - Changelog: CHANGELOG.md
  
markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  
  - material.extensions.preview:
      configurations:
        - targets:
            include:
              - api-setup/*
              - features.md
              - setup-complete/*
              - quickstart.md
              - support.md

repo_url: https://github.com/joeaoregan/TUS-26-ETP-AI-Traffic-Optimisation
