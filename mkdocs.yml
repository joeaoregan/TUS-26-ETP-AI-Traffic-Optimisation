site_name: AI Traffic Optimisation System
docs_dir: docs
site_dir: site
theme:
  icon:
    admonition:
      note: material/car-sports
      success: material/car-sports
      warning: material/car-sports
      danger: material/car-sports
  logo: images/logo.png
  palette: 

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - toc.follow
    - navigation.footer
    - navigation.instant.preview
    - navigation.tracking
    - navigation.path
    - navigation.top

nav:
  - Home: 
    - 1_home/index.md
    - 🚗 API Setup Guide: 1_home/3_setup.md
    - 📡 API Usage Examples: 1_home/4_api.md
    - 🔐 Environment Variables: 1_home/5_env.md
    - 🐳 Docker Compose Configuration: 1_home/6_docker.md
    - 📊 Monitoring and Logging: 1_home/7_log.md
    - 🔄 Using Different Models: 1_home/8_model.md
    - ⚡ Performance Tuning: 1_home/9_performance.md
    - 🐛 Troubleshooting: 1_home/10_ts.md
    - 🌍 Production Deployment: 1_home/11_prod.md
  - LSTM: lstm/index.md
  - Features: FEATURES.md
  - System Architecture: SYSTEM_ARCHITECTURE.md
  - Quick Start: QUICKSTART.md
  - Setup Complete:
    - 4_setup/index.md
    - What Was Created: 4_setup/1_created.md
    - Quick Start (5 Minutes): 4_setup/2_quickstart.md
    - Architecture Overview: 4_setup/3_architecture.md
    - Key Features: FEATURES.md
    - API Endpoints: 4_setup/5_api_endpoints.md
    - Using Different Models: 4_setup/6_different_models.md
    - Testing: 4_setup/7_testing.md
    - Environment Variables: 4_setup/8_environment_variables.md
    - Development vs Production: 4_setup/9_dev_vs_prod.md
    - Documentation Files: 4_setup/10_documentation_files.md
    - Next Steps: 4_setup/11_next_steps.md
    - Support: 4_setup/12_support.md
  - File Manifest: FILE_MANIFEST.md
  - API Docs: DOCUMENTATION.md
  - Changelog: CHANGELOG.md
  - API Gateway: https://ai-traffic-control-api.onrender.com
  - Inference Service: https://traffic-inference-service.onrender.com
  - Support: SUPPORT.md
  
markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  
  - material.extensions.preview:
      configurations:
        - targets:
            include:
              - 1_home/*
              - FEATURES.md
              - 4_setup/*
              - QUICKSTART.md
              - SUPPORT.md

repo_url: https://github.com/joeaoregan/TUS-26-ETP-AI-Traffic-Optimisation
repo_name: GitHub

site_url: https://joeaoregan.github.io/TUS-26-ETP-AI-Traffic-Optimisation/