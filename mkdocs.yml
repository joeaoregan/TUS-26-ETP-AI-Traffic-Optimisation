site_name: AI Traffic Optimisation System
docs_dir: docs
site_dir: site
theme:
  icon:
    admonition:
      note: material/car-sports
      success: material/car-sports
      warning: material/car-sports
      danger: material/car-sports
  logo: images/logo.png
  palette: 

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - toc.follow
    - navigation.footer
    - navigation.instant.preview
    - navigation.tracking
    - navigation.path
    - navigation.top

nav:
  - Home: 
    - index.md    
    - 🗂️ Project Structure: system-architecture/project-structure.md
    - External Links:    
      - 🔐 API Gateway: https://ai-traffic-control-api.onrender.com
      - 📚 API Gateway Documentation: https://ai-traffic-control-api.onrender.com/swagger-ui/index.html
      - 🤖 Inference Service: https://traffic-inference-service.onrender.com
      - 📚 Inference Service Documentation: https://traffic-inference-service.onrender.com/docs
      - 🔗 GitHub Repository: https://github.com/joeaoregan/TUS-26-ETP-AI-Traffic-Optimisation
  - API Gateway: 
