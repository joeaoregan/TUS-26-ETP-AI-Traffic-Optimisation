site_name: AI Traffic Optimisation System
docs_dir: docs
site_dir: site
theme:
  icon:
    admonition:
      note: material/car-sports
      success: material/car-sports
      warning: material/car-sports
      danger: material/car-sports
  logo: images/logo.png
  palette: 

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - toc.follow
    - navigation.footer
    - navigation.instant.preview
    - navigation.tracking
    - navigation.path
    - navigation.top

nav:
  - Home: index.md
  - API Setup: 
    - api-setup/index.md
    - 🚗 API Setup Guide: api-setup/api-setup-guide.md
    - 📡 API Usage Examples: api-setup/api-usage-examples.md
    - 🔐 Environment Variables: api-setup/environment-variables.md
    - 🐳 Docker Compose Configuration: api-setup/docker-compose-configuration.md
    - 📊 Monitoring and Logging: api-setup/monitoring-and-logging.md
    - 🔄 Using Different Models: api-setup/using-different-models.md
    - ⚡ Performance Tuning: api-setup/performance-tuning.md
    - 🐛 Troubleshooting: api-setup/troubleshooting.md
    - 🌍 Production Deployment: api-setup/production-deployment.md
  - LSTM: lstm/index.md
  - Features: features.md
  - System Architecture: system-architecture.md
  - Quick Start: quickstart.md
  - Setup Complete:
    - setup-complete/index.md
    - What Was Created: setup-complete/what-was-created.md
    - Quick Start (5 Minutes): setup-complete/quickstart.md
    - Architecture Overview: setup-complete/architecture-overview.md
    - Key Features: features.md
    - API Endpoints: setup-complete/api-endpoints.md
    - Using Different Models: setup-complete/using-different-models.md
    - Testing: setup-complete/testing.md
    - Environment Variables: setup-complete/environment-variables.md
    - Development vs Production: setup-complete/development-vs-production.md
    - Documentation Files: setup-complete/documentation-files.md
    - Next Steps: setup-complete/next-steps.md
    - Support: setup-complete/support.md
  - File Manifest: file-manifest.md
  - API Docs: api-docs.md
  - Changelog: CHANGELOG.md
  - API Gateway: https://ai-traffic-control-api.onrender.com
  - Inference Service: https://traffic-inference-service.onrender.com
  - Support: support.md
  
markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  
  - material.extensions.preview:
      configurations:
        - targets:
            include:
              - api-setup/*
              - features.md
              - setup-complete/*
              - quickstart.md
              - support.md

repo_url: https://github.com/joeaoregan/TUS-26-ETP-AI-Traffic-Optimisation
repo_name: GitHub

site_url: https://joeaoregan.github.io/TUS-26-ETP-AI-Traffic-Optimisation/