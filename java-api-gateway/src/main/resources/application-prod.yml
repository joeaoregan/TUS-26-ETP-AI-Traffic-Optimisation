# Production Overrides for Render
rl:
  inference:
    service:
      timeout: 2000
      # This will look for a Render Environment Variable named RL_INFERENCE_URL
      # If not found, it defaults to the placeholder string
      url: ${RL_INFERENCE_URL:http://localhost:8000/predict_action}

spring:
  application:
    name: traffic-control-gateway-prod

logging:
  level:
    root: WARN  # Less verbose logging for production
    com.example.gateway: INFO

security:
  jwt:
    issuer: ${JWT_ISSUER:traffic-api-gateway}
    secret: ${JWT_SECRET:change-this-secret-key-to-a-very-long-random-value}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  auth:
    username: ${JWT_AUTH_USERNAME:admin}
    password: ${JWT_AUTH_PASSWORD:admin123}