server:
  port: 8080
  servlet:
    context-path: /

# RL Inference Service Configuration
rl:
  inference:
    service:
      url: "http://localhost:8000/predict_action"
      timeout: 10000
    observation-dimension: 19

# LSTM Predictor Service Configuration
lstm:
  predictor:
    service:
      url: "http://localhost:8001/predict"
      timeout: 10000

logging:
  level:
    root: INFO
    com:
      example:
        gateway: DEBUG

# Spring Boot Configuration
# Connection pool configuration
spring:
  application:
    name: traffic-control-gateway
  http:
    client:
      connect-timeout: 5000
      read-timeout: 10000

# Actuator — exposes health, metrics, and info endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: traffic-control-gateway

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false
  # Force scan the package
  packagesToScan: com.example.gateway
  # Auto-configure model converters
  model-and-view-supported: true

security:
  jwt:
    issuer: ${JWT_ISSUER:traffic-api-gateway}
    # Must be at least 32 bytes for HS256.
    secret: ${JWT_SECRET:change-this-secret-key-to-a-very-long-random-value}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  auth:
    username: ${JWT_AUTH_USERNAME:admin}
    password: ${JWT_AUTH_PASSWORD:admin123}

api:
  title: "AI Traffic Control API"
  version: "1.0.0"
  authors: "Edgars Peskaitis, Joe O'Regan"
  email: "A00258304@student.tus.ie"
  description: |
    <img src="/images/logo.png" width="360" alt="AI Traffic Management System Logo" />
    ## Joe O'Regan, Edgars Peskaitis
    ## Adam O Neill Mc Knight, David Claffey
    [![Test Page](https://img.shields.io/badge/Render-Test%20Page-blue?logo=internet-explorer)](https://ai-traffic-control-api.onrender.com/)
    [![Repository](https://img.shields.io/badge/repo-TUS--26--ETP--AI--Traffic--Optimisation-blue?logo=github&logoColor=white)](https://github.com/joeaoregan/TUS-26-ETP-AI-Traffic-Optimisation)
    [![Docs](https://img.shields.io/badge/Docs-Read-blue?logo=readme)](https://joeaoregan.github.io/TUS-26-ETP-AI-Traffic-Optimisation/)
  
    This API provides traffic signal control capabilities powered by a Reinforcement Learning (RL) inference service and traffic forecasting via LSTM.

    ## Overview
    [Documentation](https://joeaoregan.github.io/TUS-26-ETP-AI-Traffic-Optimisation/)
    
    The system simulates or accepts real-time traffic observations and uses an RL model to predict the optimal traffic signal action. \
    LSTM service provides density forecasts for lookahead planning and proactive signal timing optimization.

    ## Authentication
    [Authentication Documentation](https://joeaoregan.github.io/TUS-26-ETP-AI-Traffic-Optimisation/api-gateway/authentication/)
    
    Most endpoints require **JWT Bearer token authentication**. \
    Obtain a token via `POST /api/auth/login` using default credentials (username: `admin`, password: `admin123`). \
    Include the token in the `Authorization` header: `Bearer <your-jwt-token>`

    ## Key Features
    [Key Feature Documentation](https://joeaoregan.github.io/TUS-26-ETP-AI-Traffic-Optimisation/api-gateway/key-features/)
    - **JWT authentication** (HS256) for secure API access.
    - **Automatic traffic signal prediction** using RL inference.
    - **Traffic density forecasting** using LSTM predictor.
    - **Batch predictions** for multi-step lookahead planning.
    - **Support for custom observation inputs** for testing and experimentation.
    - **Health monitoring** to verify availability of all services.
    - **Structured success and error responses** for consistent API behavior.
    - **Fallback mode** when services are unavailable.

    ## Endpoints
    [Endpoint Documentation](https://joeaoregan.github.io/TUS-26-ETP-AI-Traffic-Optimisation/api-gateway/endpoints/)
    - `POST /api/auth/login` Authenticate and receive JWT token (public).
    - `GET /api/traffic/action` Generates dummy observations and returns predicted traffic signal state.
    - `POST /api/traffic/action` Accepts custom observations and returns model prediction.
    - `GET /api/traffic/forecast` Get traffic density forecast for next hour.
    - `POST /api/traffic/forecast-batch` Get multi-step ahead density predictions.
    - `POST /api/traffic/reset` Reset GRU hidden states for all junctions.
    - `GET /api/traffic/health` Reports health status of all services.

    This API is designed for academic, experimental, and demonstration purposes within a cloud-native microservices architecture.

