services:
  rl-inference:
    # image: rl-inference-service:2.0.0
    build: ./rl-inference-service
    container_name: rl-inference-service
    ports:
      - "8000:8000"
    environment:
      MAPPO_AGENT_PATH: /app/trained_models/agent.th
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
    volumes:
      - ./rl-inference-service/app/trained_models:/app/trained_models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - traffic-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  lstm-predictor:
    # image: lstm-predictor-service:2.0.0
    build: ./lstm-predictor-service
    container_name: lstm-predictor-service
    ports:
      - "8001:8001"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8001
      LOG_LEVEL: INFO
      API_RELOAD: "false"
    volumes:
      - ./lstm-predictor-service/app/trained_models:/app/trained_models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - traffic-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  java-gateway:
    # image: traffic-api-gateway:2.0.0
    build: ./java-api-gateway
    container_name: traffic-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      rl-inference:
        condition: service_healthy
      lstm-predictor:
        condition: service_healthy
    environment:
      RL_INFERENCE_URL: http://rl-inference:8000/predict_action
      LSTM_PREDICTOR_URL: http://lstm-predictor:8001/predict
      RL_INFERENCE_SERVICE_TIMEOUT: "10000"
      LSTM_PREDICTOR_TIMEOUT: "10000"
      JWT_SECRET: change-this-secret-key-to-a-very-long-random-value
      JWT_AUTH_USERNAME: admin
      JWT_AUTH_PASSWORD: admin123
      JWT_EXPIRATION_MINUTES: "60"
    networks:
      - traffic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/traffic/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traffic-network:
    driver: bridge

volumes:
  trained_models:
    driver: local
    