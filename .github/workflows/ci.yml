name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java-gateway-tests:
    name: Java API Gateway Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: java-api-gateway
        run: mvn test -B

      - name: Build JAR
        working-directory: java-api-gateway
        run: mvn package -DskipTests -B

  python-lint:
    name: Python Services Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint RL inference service
        run: |
          pip install flake8
          flake8 rl-inference-service/app/ --max-line-length=120 --count --show-source --statistics

      - name: Lint LSTM predictor service
        run: |
          flake8 lstm-predictor-service/app/ --max-line-length=120 --count --show-source --statistics

      - name: Test RL inference service
        working-directory: rl-inference-service
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v

      - name: Ensure static directory exists for LSTM predictor service
        working-directory: lstm-predictor-service
        run: mkdir -p app/static

      - name: Test LSTM predictor service
        working-directory: lstm-predictor-service
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [java-gateway-tests, python-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build RL Inference Service
        run: docker build -t rl-inference-service:test ./rl-inference-service

      - name: Build LSTM Predictor Service
        run: docker build -t lstm-predictor-service:test ./lstm-predictor-service

      - name: Build Java API Gateway
        run: docker build -t traffic-api-gateway:test ./java-api-gateway